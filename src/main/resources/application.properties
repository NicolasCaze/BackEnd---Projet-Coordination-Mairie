# Configuration JWT
jwt.secret=mySecretKeyForMairieProject2024!@#$%^&*()
jwt.expiration=86400
jwt.refresh-expiration=604800

# Configuration Spring Boot - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/mairie_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File upload configuration
app.upload.directory=temp-uploads
app.upload.max-size=10485760

# SMTP Configuration (use environment variables for credentials)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.secretariat=${MAIL_SECRETARIAT:secretariat@mairie.fr}
